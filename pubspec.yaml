name: socialchat_mvp
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=2.17.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  geolocator: ^12.0.0

  

  flutter_localizations:
    sdk: flutter


  shared_preferences: ^2.2.3
  cupertino_icons: ^1.0.8
  


  firebase_messaging: ^15.1.0
  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.4.10
  purchases_flutter: ^8.0.0
  record: ^6.2.0
  just_audio: ^0.9.36
  path_provider: ^2.1.2

  
  sign_in_with_apple: ^6.1.0
  google_sign_in: ^6.2.1
  flutter_local_notifications: ^17.0.0
  image_picker: ^1.2.2
  uuid: ^4.5.1
  url_launcher: ^6.3.0
  share_plus: ^10.0.0
  app_links: ^6.4.1
  http: ^1.2.2
  cloud_functions: ^5.6.2
  flutter_tts: ^4.2.5
 

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1


flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/remdy_icon.png"

flutter:
  uses-material-design: true


  assets:
    - lib/l10n/en.json
    - lib/l10n/pt-BR.json
    - lib/l10n/pt-PT.json
    - lib/l10n/es.json
    - lib/l10n/fr.json
    - assets/remdy_logo.png
    - assets/remdy_icon.png
    - assets/remdy_logo_s_fundo.png

dependency_overrides:
    record_linux: ^1.0.0    
